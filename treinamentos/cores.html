<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cores CSS</title>
    <link rel="stylesheet" href="../assets/cores.css" />
  </head>
  <body>
    <h1>Cores CSS</h1>
    <p>
        Existem varias formas de definirmos cores em CSS, as mais comuns são:
        <ul>
            <li id="pre-definidas">Cores Pre-definidas</li>
            <li id="current-color">Palavra chave "Currentcolor"</li>
            <li id="hex">Hexadecimal</li>
            <li id="hex-transparent">Hexadecimal com Transparência</li>
            <li id="rgb">RGB</li>
            <li id="rgba">RGB com Transparência</li>
            <li id="hsl">HSL</li>
            <li id="hsla">HSL com Transparência</li>
        </ul>

    </p>
